<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile</title>
    <link rel="stylesheet" href="style.css" />
    <script
      src="https://kit.fontawesome.com/b14dca9889.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div class="container">
      <div class="banner"></div>

      <div class="content">
        <img
          src="./images/avatar.jpg"
          alt="All Ahmad's Profile Picture"
          class="avatar-img"
        />

        <h1 class="name">Alaa Ahmad</h1>

        <div class="location">
          <span class="pin-icon"><i class="fa-solid fa-location-dot"></i></span>
          palestine
        </div>

        <p class="tagline">Developer | Engineer | Problem Solver</p>
        <p class="bio">Master of shadows and the Internet!</p>

        <div class="edit">
          <span class="gear-icon"><i class="fa-solid fa-gear"></i></span>
          <a href="#">edit profile</a>
        </div>
      </div>
    </div>
  </body>
</html>
